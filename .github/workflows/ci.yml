name: CI

on:
  push:
    branches: ['**']
    tags: ['[0-9][0-9][0-9][0-9].[0-9]*']
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - run: pip install pre-commit && pre-commit run --all-files

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build assets
        run: make all

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: |
            build/PBDarkTemplateMovies.zip
            build/PBDarkTemplateTVShows.zip

  release:
    if: github.ref_type == 'tag'
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: build/

      - name: Extract changelog
        id: changelog
        run: |
          body=$(bash scripts/extract_changelog.sh "${{ github.ref_name }}")
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            build/PBDarkTemplateMovies.zip
            build/PBDarkTemplateTVShows.zip
