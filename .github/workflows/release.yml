name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build assets
        run: make all

      - name: Extract changelog
        id: changelog
        run: |
          body=$(bash scripts/extract_changelog.sh "${{ github.ref_name }}")
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            build/PBDarkTemplateMovies.zip
            build/PBDarkTemplateTVShows.zip
